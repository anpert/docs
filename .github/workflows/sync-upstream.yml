
name: Sync from upstream (original repo)

on:
  schedule:
    - cron: '0 4 * * *'   # joka yö klo 04
  workflow_dispatch:      # käsin ajettavissa

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream (original repo)
        run: |
          git remote add upstream https://github.com/anpert/docs.git

      - name: Fetch upstream
        run: |
          git fetch upstream

      - name: Merge upstream/main
        run: |
          git checkout main
          git merge upstream/main --no-edit

      - name: Push changes
        run: |
          git push origin main
